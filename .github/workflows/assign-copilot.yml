name: Assign Copilot to user-submitted issues

on:
  issues:
    types: [opened, labeled]

jobs:
  assign-copilot:
    if: contains(github.event.issue.labels.*.name, 'by-users')
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Tag Copilot
        run: |
          gh issue comment "$ISSUE_URL" --body "@copilot Please review this change request and implement the requested changes."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
