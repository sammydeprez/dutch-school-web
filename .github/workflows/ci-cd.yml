name: CI/CD Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - '.github/change-request-attachments/**'
  pull_request:
    branches:
      - main

env:
  NODE_VERSION: '20'
  RESOURCE_GROUP: 'rg-dutch-school-web'
  SWA_NAME: 'dutch-school-nairobi'
  LOCATION: 'westeurope'

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Copy SWA config to output
        run: cp staticwebapp.config.json out/

      - name: Install API dependencies
        run: npm install --prefix api

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: static-site
          path: out
          retention-days: 1

      - name: Upload API artifact
        uses: actions/upload-artifact@v4
        with:
          name: api
          path: api
          retention-days: 1

  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: build
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: static-site
          path: out

      - name: Download API artifact
        uses: actions/download-artifact@v4
        with:
          name: api
          path: api

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create Resource Group (if not exists)
        run: |
          az group create \
            --name ${{ env.RESOURCE_GROUP }} \
            --location ${{ env.LOCATION }} \
            --tags project=dutch-school-web environment=production \
            || true

      - name: Create Static Web App (if not exists)
        run: |
          # Check if SWA exists
          SWA_EXISTS=$(az staticwebapp list --resource-group ${{ env.RESOURCE_GROUP }} --query "[?name=='${{ env.SWA_NAME }}'].name" -o tsv)

          if [ -z "$SWA_EXISTS" ]; then
            echo "Creating Static Web App..."
            az staticwebapp create \
              --name ${{ env.SWA_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --location ${{ env.LOCATION }} \
              --sku Free
          else
            echo "Static Web App already exists"
          fi

      - name: Get Deployment Token
        id: swa
        run: |
          TOKEN=$(az staticwebapp secrets list \
            --name ${{ env.SWA_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "properties.apiKey" -o tsv)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa.outputs.token }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          app_location: 'out'
          api_location: 'api'
          output_location: ''
          skip_app_build: true
          skip_api_build: false

      - name: Configure GitHub Token
        run: |
          az staticwebapp appsettings set \
            --name ${{ env.SWA_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --setting-names GITHUB_TOKEN='${{ secrets.GH_ISSUES_PAT }}'

      - name: Configure MailerSend Token
        run: |
          az staticwebapp appsettings set \
            --name ${{ env.SWA_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --setting-names MAILERSEND_API_TOKEN='${{ secrets.MAILERSEND_API_TOKEN }}'
